<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Laptop body -->
  <rect x="110" y="360" width="300" height="185" rx="12" fill="#2D2D2D" stroke="#ED6B23" stroke-width="5"/>
  <!-- Laptop screen -->
  <rect x="125" y="370" width="270" height="160" rx="6" fill="#1a1a2e"/>
  <!-- Code lines on screen -->
  <rect x="140" y="385" width="90" height="7" rx="3" fill="#ED6B23" opacity="0.9"/>
  <rect x="140" y="400" width="140" height="7" rx="3" fill="#4ECDC4" opacity="0.8"/>
  <rect x="155" y="415" width="110" height="7" rx="3" fill="#FFFFFF" opacity="0.6"/>
  <rect x="155" y="430" width="80" height="7" rx="3" fill="#ED6B23" opacity="0.7"/>
  <rect x="140" y="445" width="120" height="7" rx="3" fill="#4ECDC4" opacity="0.8"/>
  <rect x="140" y="460" width="60" height="7" rx="3" fill="#FFFFFF" opacity="0.5"/>
  <!-- Cursor blink -->
  <rect x="205" y="460" width="6" height="12" rx="1" fill="#ED6B23"/>
  <!-- Laptop base -->
  <rect x="95" y="500" width="330" height="14" rx="7" fill="#2D2D2D" stroke="#ED6B23" stroke-width="3"/>

  <!-- Ghali head — orange outline layer -->
  <g fill="#ED6B23" stroke="#ED6B23" stroke-linejoin="round" stroke-linecap="round">
    <line x1="130" y1="142" x2="85" y2="97" stroke-width="25"/>
    <circle cx="80" cy="92" r="18" stroke-width="10"/>
    <line x1="370" y1="142" x2="415" y2="97" stroke-width="25"/>
    <circle cx="420" cy="92" r="18" stroke-width="10"/>
    <path d="M 52 227 C 5 232, 5 322, 52 327 Q 35 277 52 227 Z" stroke-width="10"/>
    <path d="M 448 227 C 495 232, 495 322, 448 327 Q 465 277 448 227 Z" stroke-width="10"/>
    <path d="M 250 92 C 380 92, 440 162, 440 267 C 440 372, 380 427, 250 427 C 120 427, 60 372, 60 267 C 60 162, 120 92, 250 92 Z" stroke-width="10"/>
  </g>

  <!-- White fill layer -->
  <g fill="#FFFFFF">
    <line x1="130" y1="142" x2="85" y2="97" stroke="#FFFFFF" stroke-width="15" stroke-linecap="round"/>
    <circle cx="80" cy="92" r="18"/>
    <line x1="370" y1="142" x2="415" y2="97" stroke="#FFFFFF" stroke-width="15" stroke-linecap="round"/>
    <circle cx="420" cy="92" r="18"/>
    <path d="M 52 227 C 5 232, 5 322, 52 327 Q 35 277 52 227 Z"/>
    <path d="M 448 227 C 495 232, 495 322, 448 327 Q 465 277 448 227 Z"/>
    <path d="M 250 92 C 380 92, 440 162, 440 267 C 440 372, 380 427, 250 427 C 120 427, 60 372, 60 267 C 60 162, 120 92, 250 92 Z"/>
  </g>

  <!-- Face details -->
  <path d="M 250 172 C 340 172, 400 202, 400 277 C 400 352, 340 402, 250 402 C 160 402, 100 352, 100 277 C 100 202, 160 172, 250 172 Z" fill="none" stroke="#ED6B23" stroke-width="14"/>

  <!-- Focused determined eyes (straight lines) -->
  <path d="M 145 270 L 210 270" stroke="#ED6B23" stroke-width="13" stroke-linecap="round"/>
  <path d="M 293 270 L 358 270" stroke="#ED6B23" stroke-width="13" stroke-linecap="round"/>

  <!-- Small focused mouth -->
  <path d="M 225 325 Q 250 335, 275 325" fill="none" stroke="#ED6B23" stroke-width="11" stroke-linecap="round"/>
</svg>
