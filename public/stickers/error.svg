<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Warning triangle -->
  <polygon points="256,30 380,240 132,240" fill="#FFD700" stroke="#ED6B23" stroke-width="8" stroke-linejoin="round"/>
  <text x="256" y="215" font-family="Arial Black, sans-serif" font-size="100" font-weight="900" fill="#ED6B23" text-anchor="middle">!</text>

  <!-- Ghali head — orange outline layer -->
  <g fill="#ED6B23" stroke="#ED6B23" stroke-linejoin="round" stroke-linecap="round">
    <line x1="130" y1="185" x2="85" y2="140" stroke-width="25"/>
    <circle cx="80" cy="135" r="18" stroke-width="10"/>
    <line x1="370" y1="185" x2="415" y2="140" stroke-width="25"/>
    <circle cx="420" cy="135" r="18" stroke-width="10"/>
    <path d="M 52 270 C 5 275, 5 365, 52 370 Q 35 320 52 270 Z" stroke-width="10"/>
    <path d="M 448 270 C 495 275, 495 365, 448 370 Q 465 320 448 270 Z" stroke-width="10"/>
    <path d="M 250 135 C 380 135, 440 205, 440 310 C 440 415, 380 470, 250 470 C 120 470, 60 415, 60 310 C 60 205, 120 135, 250 135 Z" stroke-width="10"/>
  </g>

  <!-- White fill layer -->
  <g fill="#FFFFFF">
